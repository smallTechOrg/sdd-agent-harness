</style></head><body><div class="bespoke-marp-osc"><button data-bespoke-marp-osc="prev" tabindex="-1" title="Previous slide">Previous slide</button><span data-bespoke-marp-osc="page"></span><button data-bespoke-marp-osc="next" tabindex="-1" title="Next slide">Next slide</button><button data-bespoke-marp-osc="fullscreen" tabindex="-1" title="Toggle fullscreen (f)">Toggle fullscreen</button><button data-bespoke-marp-osc="overview" tabindex="-1" title="Toggle overview view (o)">Toggle overview view</button><button data-bespoke-marp-osc="presenter" tabindex="-1" title="Open presenter view (p)">Open presenter view</button></div><div id=":$p"><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="1" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="1" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h1 id="spec-driven-development--agentic-harnesses">Spec-Driven Development &amp; Agentic Harnesses</h1>
<h2 id="our-choices-vs-the-field-vs-academic-rigor">our choices vs the field vs academic rigor</h2>
<p>A working tour of how AI-coded systems keep <strong>intent</strong> and <strong>implementation</strong> from diverging — and where our harness lands among OpenSpec, GitHub Spec Kit, AWS Kiro, and Tessl.</p>
<p><em>Audience: engineers deciding how to structure spec <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> code for AI-built agents.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="2" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="why-this-deck-exists">Why this deck exists</h2>
<p><strong>Educate before we decide.</strong> We are about to make architectural commitments (spec format, who-wins-on-conflict, the build loop). Those are expensive to reverse. This deck front-loads the field so the decisions are informed, not default.</p>
<ul>
<li><strong>The field is young and unsettled.</strong> Four serious tools (OpenSpec, Spec Kit, Kiro, Tessl) disagree on fundamentals — even on <em>which artifact is the source of truth</em>. There is no consensus to copy.</li>
<li><strong>Our repo already took a contrarian position.</strong> <code>NORTH-STAR.md</code> line 13: <em>&quot;CODE — the source of truth.&quot;</em> Most of the field says the <em>spec</em> is truth. We should understand that fork deliberately, not by accident.</li>
<li><strong>Goal of the opening:</strong> shared vocabulary + a map. By the end you can place any tool — and our harness — on one diagram.</li>
</ul>
<blockquote>
<p>No conclusions yet. Just the lay of the land.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="3" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="the-core-problem-intent-that-wont-stay-put">The core problem: intent that won't stay put</h2>
<p>AI writes code <strong>fast</strong>. The bottleneck moved from <em>typing code</em> to <em>keeping code and intent aligned</em> as both change.</p>
<ul>
<li><strong>Drift is the default.</strong> You spec a behaviour, the agent implements it, then three changes later the code does something the spec never mentions — or the spec promises something the code dropped. Now neither is trustworthy.</li>
<li><strong>Two failure modes, equally bad:</strong>
<ul>
<li><em>Stale spec</em> — doc says X, code does Y. The &quot;source of truth&quot; lies.</li>
<li><em>Phantom spec</em> — spec describes a feature that was never built (or silently stubbed).</li>
</ul>
</li>
<li><strong>The real question is durability:</strong> when intent and implementation conflict, <strong>which one wins, and how is that enforced — mechanically, not by good intentions?</strong></li>
</ul>
<p><em>Source: <code>NORTH-STAR.md</code> (&quot;Anti-goals&quot;): &quot;Docs that cite files which don't exist.&quot;)</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="4" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="key-terms">Key terms</h2>
<table>
<thead>
<tr>
<th>Term</th>
<th>Working definition</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Spec</strong></td>
<td>A human-readable statement of <em>what</em> the system should do (behaviour, interfaces, acceptance). Markdown, usually.</td>
</tr>
<tr>
<td><strong>Code</strong></td>
<td>The executable, tested artifact. The <em>what</em> made real.</td>
</tr>
<tr>
<td><strong>Harness</strong></td>
<td>The tooling around the agent that drives the build loop and enforces the rules — <em>not</em> the app it produces.</td>
</tr>
<tr>
<td><strong>SDD</strong></td>
<td>Spec-Driven Development: making a spec the explicit unit of work the agent operates on.</td>
</tr>
<tr>
<td><strong>Drift</strong></td>
<td>Spec and code disagree. The condition SDD exists to fight.</td>
</tr>
<tr>
<td><strong>Reconciliation</strong></td>
<td>The mechanism that re-aligns spec <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> code, and decides who wins on conflict.</td>
</tr>
<tr>
<td><strong>EARS</strong></td>
<td><em>Easy Approach to Requirements Syntax</em> — constrained templates (&quot;WHEN &lt;trigger&gt;, the system SHALL &lt;response&gt;&quot;) for unambiguous requirements. Used by AWS Kiro's <code>requirements.md</code>.</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="5" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="a-map-of-the-field">A map of the field</h2>
<p>Two independent axes. Every tool — and ours — is a point in this grid.</p>
<p><strong>Axis 1 — Direction of truth (who wins on conflict):</strong></p>
<table>
<thead>
<tr>
<th>Position</th>
<th>Meaning</th>
<th>Who</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Spec-first</strong></td>
<td>Spec is canonical; code is generated/regenerated from it</td>
<td>Tessl, Spec Kit, Kiro, OpenSpec</td>
</tr>
<tr>
<td><strong>Code-first</strong></td>
<td>Code is canonical; spec is <em>projected from</em> the code</td>
<td><strong>Us</strong> (<code>NORTH-STAR.md</code>)</td>
</tr>
<tr>
<td><strong>Reconciliation-based</strong></td>
<td>Neither is fixed; a sync step merges/audits both ways</td>
<td>OpenSpec archive, Spec Kit <code>/analyze</code></td>
</tr>
</tbody>
</table>
<p><strong>Axis 2 — What plays the role of &quot;spec&quot;:</strong></p>
<ul>
<li><strong>doc-as-spec</strong> — prose/Markdown requirements (Spec Kit, Kiro, OpenSpec, our <code>spec/</code>)</li>
<li><strong>test-as-spec</strong> — executable acceptance checks are the binding contract (our <code>proof-gate</code>; classic TDD)</li>
<li><strong>types-as-spec</strong> — schemas/types/contracts constrain the code (dependently-typed &amp; contract-driven lineage)</li>
</ul>
<blockquote>
<p>The interesting tools mix these. Our harness is <strong>code-first + doc-as-spec for reading + test-as-spec for proof.</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="6" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="what-well-cover">What we'll cover</h2>
<ol>
<li><strong>The problem &amp; the field</strong> <em>(you are here)</em> — drift, vocabulary, the truth-direction axis.</li>
<li><strong>The four competitors, deeply</strong> — OpenSpec's delta-spec tree · Spec Kit's Constitution→Implement pipeline · Kiro's three-file EARS gates · Tessl's spec-as-projection.</li>
<li><strong>Academic rigor</strong> — formal specs, refinement, EARS, what &quot;verified&quot; actually means.</li>
<li><strong>Our six design bricks:</strong>
<ul>
<li>repo skeleton (<code>harness</code> / <code>spec</code> / code / <code>.claude</code> contract)</li>
<li>spec format · reconciliation (who wins) · the build loop · the <code>.claude</code> adapter · validation by simulating the workflow</li>
</ul>
</li>
<li><strong>Decisions</strong> — where we agree with the field, where we deliberately don't, open forks.</li>
</ol>
<p><em>Our current shape (real folders): <code>NORTH-STAR.md</code>, <code>.claude/commands/{new,change,sync}.md</code>, <code>.claude/agents/{spec-projector,reviewer}.md</code>, <code>.claude/skills/{proof-gate,agentic-patterns}/</code>.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="7" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h1 id="openspec">OpenSpec</h1>
<h3 id="agent-agnostic-spec-driven-development-built-on-a-living-spec-tree">Agent-agnostic spec-driven development, built on a living spec tree</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="8" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="what-it-is--whos-behind-it">What it is + who's behind it</h2>
<ul>
<li><strong>OpenSpec</strong> by <strong>Fission-AI</strong> — a lightweight, <strong>agent-agnostic</strong> spec-driven development (SDD) tool for AI coding assistants. MIT, <strong>~55.7k GitHub stars</strong>, active through mid-June 2026.</li>
<li>Core idea: agree on <strong>WHAT</strong> before code. Split the repo into a <strong>source-of-truth spec tree</strong> and a <strong>proposed-changes tree</strong>; a sync/archive step merges change deltas back so the spec <strong>grows as changes land</strong>.</li>
<li>Pure markdown + a CLI + generated instruction files (<code>CLAUDE.md</code>/<code>AGENTS.md</code> + per-tool slash commands). <strong>No IDE lock-in</strong> (vs Kiro), <strong>no Python</strong> (vs Spec Kit).</li>
<li>Strong dogfooding: the tool specs <strong>itself</strong> with <strong>~48 capability folders</strong>.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>openspec/                  # created by `openspec init`
  config.yaml              # active schema/profile
  specs/                   # SOURCE OF TRUTH — behavior NOW
    &lt;capability&gt;/spec.md   # one capability per folder (cli-validate/, schema-resolution/)
  changes/                 # PROPOSED modifications (live until archived)
    &lt;change-name&gt;/         # verb-led kebab-case (add-global-install-scope/)
      proposal.md  design.md  tasks.md
      specs/&lt;capability&gt;/spec.md   # DELTA spec for this change
    archive/YYYY-MM-DD-&lt;change-name&gt;/
  initiatives/  explorations/      # durable + exploratory planning
</code></pre>
<p><em>Source: github.com/Fission-AI/OpenSpec (repo metadata + contents listings)</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="9" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="spec-format--requirements--scenarios">Spec format — requirements + scenarios</h2>
<p>Markdown, <strong>RFC-2119 SHALL prose + WHEN/THEN/AND bullets</strong> (NOT EARS — the word appears nowhere in conventions/concepts). A capability <code>spec.md</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown"><span class="hljs-section">## Purpose</span>
<span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">capability</span> <span class="hljs-attr">description</span>&gt;</span></span>

<span class="hljs-section">## Requirements</span>
<span class="hljs-section">### Requirement: Install Scope Selection</span>
The init command SHALL support install scope selection.   # narrative + 1 normative SHALL

<span class="hljs-section">#### Scenario: User picks global scope</span>
<span class="hljs-bullet">-</span> <span class="hljs-strong">**WHEN**</span> the user selects global install
<span class="hljs-bullet">-</span> <span class="hljs-strong">**THEN**</span> commands are written to the user home directory
<span class="hljs-bullet">-</span> <span class="hljs-strong">**AND**</span> the project config records the scope
</code></pre>
<ul>
<li><strong>Hard rule</strong> (verified): every requirement MUST have descriptive text AND <strong>≥1 <code>#### Scenario:</code></strong>.</li>
<li><strong>Singular focus</strong> — one responsibility per capability folder.</li>
<li><strong>Delta specs</strong> (inside a change) use operation headers — and the spec.md <em>template itself</em> is a delta:</li>
</ul>
<table>
<thead>
<tr>
<th>Header</th>
<th>Merge effect</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>## ADDED Requirements</code></td>
<td>add requirement</td>
</tr>
<tr>
<td><code>## MODIFIED Requirements</code></td>
<td>replace existing requirement</td>
</tr>
<tr>
<td><code>## REMOVED Requirements</code></td>
<td>remove it</td>
</tr>
<tr>
<td>RENAMED (FROM/TO)</td>
<td>rename</td>
</tr>
</tbody>
</table>
<p><em>Rationale (concepts doc): &quot;A delta shows exactly what's changing. Reading a full spec, you'd have to diff it mentally against the current version.&quot;</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="10" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="spec---code-reconciliation--drift">Spec &lt;-&gt; code reconciliation &amp; drift</h2>
<p>Two distinct mechanisms — <strong>don't conflate them</strong>:</p>
<table>
<thead>
<tr>
<th>Layer</th>
<th>What it does</th>
<th>Determinism</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>spec&lt;-&gt;spec</strong> <code>/opsx:sync</code>, <code>openspec archive</code></td>
<td>Merge change deltas into <code>specs/</code> (ADDED/MODIFIED/REMOVED/RENAMED). <strong>Idempotent</strong>, no dup requirements.</td>
<td>Mechanical-ish, AI-driven</td>
</tr>
<tr>
<td><strong>spec&lt;-&gt;code</strong> <code>/opsx:verify</code> (expanded, <strong>opt-in</strong>)</td>
<td>LLM reads tasks.md + deltas, searches code, reports drift.</td>
<td><strong>Non-deterministic</strong></td>
</tr>
<tr>
<td><strong>structure</strong> <code>openspec validate --strict --json</code></td>
<td>Structure only: required sections, every-req-has-scenario, &quot;No deltas found&quot;. CI gate.</td>
<td>Fully mechanical</td>
</tr>
</tbody>
</table>
<ul>
<li><code>/opsx:verify</code> 3 axes: <strong>Completeness</strong> (counts <code>- [x]</code> vs <code>- [ ]</code>, &quot;Tasks: X/N complete&quot;) · <strong>Correctness</strong> (matches spec) · <strong>Coherence</strong> (follows design). Output: CRITICAL / WARNING / SUGGESTION with file:line.</li>
<li><strong>Key gap:</strong> <code>validate</code> checks structure, <strong>not truth</strong> — it does NOT confirm a MODIFIED req matches an existing one, and <strong>never touches code</strong>. There is <strong>no <code>openspec sync</code> or <code>openspec diff</code> CLI verb</strong>; sync is a skill.</li>
<li><strong>Conflict handling</strong> when multiple changes touch one spec is <strong>UNSPECIFIED</strong> — no documented 3-way merge.</li>
</ul>
<p><em>Source: specs-sync-skill, opsx-verify-skill, cli-validate spec.md</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="11" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="workflow--commands-not-stages">Workflow — commands, not stages</h2>
<p>Install <code>@fission-ai/openspec</code> (Node 20.19.0+) -&gt; <code>openspec init</code> (pick tools + profile) -&gt; <code>openspec update</code> refreshes agent instructions.</p>
<p><strong>The loop:</strong></p>
<ol>
<li><strong>PROPOSE</strong> — <code>/opsx:propose &lt;idea&gt;</code> scaffolds the change folder: proposal -&gt; deltas -&gt; design -&gt; tasks, in dependency order.</li>
<li><strong>REVIEW</strong> — human refines artifacts <em>before code</em>; <code>openspec validate --strict</code>; <code>view</code>/<code>list</code>/<code>show</code>/<code>status</code>.</li>
<li><strong>APPLY</strong> — <code>/opsx:apply</code> implements tasks.md, ticking checkboxes.</li>
<li><strong>VERIFY</strong> (expanded, optional) — <code>/opsx:verify</code> AI-checks code vs spec.</li>
<li><strong>SYNC/ARCHIVE</strong> — <code>/opsx:sync</code> merges deltas; <code>/opsx:archive</code> validates + dates the folder into <code>changes/archive/</code>.</li>
</ol>
<ul>
<li><strong>CORE profile:</strong> <code>propose · explore · apply · sync · archive</code>. <strong>EXPANDED adds:</strong> <code>new · continue · ff · verify · bulk-archive · onboard</code>.</li>
<li>Workflow is <strong>data, not prompt</strong>: per-schema <code>schema.yaml</code> artifact graph — proposal -&gt; specs+design -&gt; tasks (requires BOTH) -&gt; apply. Forkable via <code>openspec schema fork</code>; a second <code>workspace-planning</code> schema already exists.</li>
</ul>
<p><em>Philosophy (workflows doc): &quot;Commands are things you can do, not stages you're stuck in&quot; · &quot;Dependencies are enablers—they show what's possible, not what's required next.&quot;</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="12" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="strengths--weaknesses--and-for-our-harness">Strengths / weaknesses — and for OUR harness</h2>
<p><strong>Strengths</strong></p>
<ul>
<li>Clean <strong>two-zone</strong> model: current truth vs proposed change, explicit on disk.</li>
<li><strong>Delta requirements</strong> -&gt; small, intent-shaped, reviewable diffs.</li>
<li>Sync/archive = <strong>living spec</strong> via verified idempotent merge.</li>
<li>Genuinely <strong>agent-agnostic</strong>; deterministic <strong>structural</strong> gate (<code>validate --strict --json</code>).</li>
</ul>
<p><strong>Weaknesses</strong></p>
<ul>
<li>Spec&lt;-&gt;code reconciliation is <strong>only semantic/LLM</strong> and <strong>opt-in</strong> — a green run never fails a wrong impl.</li>
<li>Verify is <strong>non-deterministic</strong>; can hallucinate &quot;implemented&quot; or miss gaps.</li>
<li><strong>No runtime/behavioral proof</strong> — correctness asserted by <em>reading</em> code, never executing it.</li>
<li>Multi-change conflict merge <strong>unspecified</strong>; peripheral surface (initiatives/explorations/workspaces) risks <strong>ceremony creep</strong>.</li>
</ul>
<table>
<thead>
<tr>
<th>STEAL</th>
<th>AVOID</th>
</tr>
</thead>
<tbody>
<tr>
<td>Two-zone disk model + explicit merge-on-completion as the spine</td>
<td>Letting reconciliation rest on an LLM <em>reading</em> code — boot the app, run real behavior</td>
</tr>
<tr>
<td>Delta ADDED/MODIFIED/REMOVED/RENAMED as the unit of change</td>
<td>Treating <code>validate</code> pass as &quot;reconciled&quot; — keep structure-gate and proof-gate distinct</td>
</tr>
<tr>
<td>Hard rule: every req has text + ≥1 scenario, enforced in a <strong>git hook</strong></td>
<td>4-artifact ceremony per tiny change — make heavy artifacts opt-in</td>
</tr>
<tr>
<td>Schema-as-data dependency graph (declarative, forkable)</td>
<td>Relying on generated AGENTS.md reminders as the sync mechanism — enforce mechanically</td>
</tr>
<tr>
<td>verify's 3-axis framing (completeness/correctness/coherence) — <strong>but back it with EXECUTION</strong></td>
<td>Claiming EARS when it's SHALL prose — be honest or commit to a checkable grammar</td>
</tr>
</tbody>
</table>
<p><em>Source: OpenSpec concepts/workflows/cli docs; verified repo corpus</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="13" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h1 id="github-spec-kit">GitHub Spec Kit</h1>
<h3 id="constitution-%E2%86%92-specify-%E2%86%92-clarify-%E2%86%92-plan-%E2%86%92-tasks-%E2%86%92-implement">Constitution → Specify → Clarify → Plan → Tasks → Implement</h3>
<p><em>Agent-agnostic spec-driven toolkit — intent as source of truth, code generated from it</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="14" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="what-it-is--layout">What it is + layout</h2>
<ul>
<li><strong>Agent-agnostic toolkit</strong>: one set of templates/scripts drives 30+ AI coding agents (Copilot, Claude Code, Gemini, Codex, Cursor, Windsurf, Zed, Kiro). Knowledge lives in <code>templates/</code> + <code>scripts/</code>, not a frozen app — &quot;no lock-in.&quot;</li>
<li>Pipeline runs as slash commands, all carrying the <strong><code>/speckit.</code></strong> prefix; each maps to an agent-skill id (e.g. <code>speckit-clarify</code>).</li>
<li><code>specify init &lt;name&gt; --integration &lt;agent&gt;</code> (or <code>init .</code> / <code>--here</code>, <code>--force</code> to overwrite) scaffolds two roots. Requires <strong>uv + Python 3.11+</strong>; CLI via <code>uv tool install</code> or <code>uvx</code>.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>.specify/                      # the toolkit's brain (agent-agnostic)
  memory/constitution.md       # project-wide MUST principles, read by every phase
  templates/                   # spec/plan/tasks/checklist/constitution templates
    overrides/                 # highest-priority template layer (project-local)
  scripts/bash/                # create-new-feature.sh, setup-plan.sh, ... (+ powershell/)
specs/                         # per-feature, human-readable
  001-&lt;feature-slug&gt;/          # auto-numbered by create-new-feature.sh
    spec.md plan.md tasks.md research.md data-model.md quickstart.md
    contracts/                 # api-spec.json, ...
.claude/commands/              # per-agent command files installed at init
</code></pre>
<ul>
<li><strong>Template resolution (first match wins, used entirely):</strong> overrides &gt; installed presets (by <code>priority</code>) &gt; extensions (by <code>priority</code>) &gt; Spec Kit core. The feature directory is the unit: <strong>one feature = one numbered folder.</strong></li>
</ul>
<p><em>Source: github/spec-kit README; docs/reference/presets.md</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="15" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="spec-format">Spec format</h2>
<ul>
<li><strong>Markdown, abstraction-enforced</strong>: the spec phase <em>forbids</em> implementation detail — tech stack lives in <code>plan.md</code>; success criteria must be &quot;technology-agnostic and measurable&quot; (vague adjectives like <em>fast/scalable/secure</em> get flagged).</li>
<li>Authored by the agent from a natural-language prompt, refined via dialogue. Three sections are <strong>mandatory</strong>: User Scenarios &amp; Testing, Requirements, Success Criteria.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code># spec-template.md (order)
User Scenarios &amp; Testing
  User Story 1 - &lt;Title&gt; (Priority: P1)   # Why this priority / Independent Test / Acceptance Scenarios
Edge Cases
Requirements -&gt; Functional Requirements + Key Entities
Success Criteria -&gt; Measurable Outcomes
Assumptions
Review &amp; Acceptance Checklist
</code></pre>
<ul>
<li><strong>Granularity:</strong> feature-level, split into independently-testable, priority-ranked <strong>P1/P2/P3</strong> user stories — each a standalone, deployable MVP slice.</li>
<li><strong>Notation:</strong> acceptance = <strong>Given/When/Then</strong> (not EARS). Ambiguity surfaced inline:<br />
<code>System MUST authenticate users via [NEEDS CLARIFICATION: auth method not specified - email/password, SSO, OAuth?]</code></li>
<li>Philosophy: templates act as <strong>sophisticated prompts</strong> that constrain LLM output toward quality. Phases map to requirements (<code>spec.md</code>) / design (<code>plan.md</code> + <code>research.md</code> + <code>data-model.md</code> + <code>contracts/</code>) / tasks (<code>tasks.md</code>).</li>
</ul>
<p><em>Source: templates/spec-template.md; spec-driven.md</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="16" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="reconciliation--the-weakest-least-enforced-part">Reconciliation — the weakest, least-enforced part</h2>
<blockquote>
<p>No automated spec<img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/>code drift <strong>gate</strong>, no CI check, no hook. The official docs site doesn't even cover ongoing sync. Three opt-in layers:</p>
</blockquote>
<table>
<thead>
<tr>
<th>Command</th>
<th>Reads code?</th>
<th>Writes</th>
<th>Detects</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>/speckit.analyze</code></td>
<td><strong>No</strong> (artifact-only)</td>
<td>None — &quot;Do not modify any files&quot;</td>
<td>dup, ambiguity, underspec, constitution, coverage gaps, inconsistency</td>
</tr>
<tr>
<td><code>/speckit.converge</code></td>
<td><strong>Yes</strong></td>
<td><strong>Append-only</strong> <code>## Phase N: Convergence</code> to <code>tasks.md</code></td>
<td>missing / partial / <strong>contradicts</strong> / <strong>unrequested</strong></td>
</tr>
<tr>
<td>evolving-specs guide</td>
<td>manual</td>
<td>manual</td>
<td>n/a (3 competing models)</td>
</tr>
</tbody>
</table>
<ul>
<li><strong><code>/analyze</code></strong>: 6 sequential passes, a <strong>requirements→tasks coverage matrix</strong>, orphaned-task + terminology-drift detection, 4 severity tiers (CRITICAL/HIGH/MEDIUM/LOW; constitution MUST-violations = CRITICAL), findings capped at 50. Audits <code>spec<img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/>plan<img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/>tasks<img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/>constitution</code> only — <strong>never the code</strong>.</li>
<li><strong><code>/converge</code></strong> <em>does</em> read the codebase (builds a code-scope map from file paths in plan/tasks) and flags drift (<code>contradicts</code>) and code-ahead-of-spec (<code>unrequested</code>) — but its <strong>only write is appending tasks</strong>: an <code>unrequested</code> finding becomes a &quot;review/justify or remove&quot; task, never a deletion or a spec rewrite.</li>
<li><strong>Evolving-specs</strong> offers 3 manual models with no enforced default: <strong>Flow-Forward</strong> (new numbered dir per iteration, historical record), <strong>Living Spec</strong> (spec is the contract → regenerate downstream → re-run analyze), <strong>Flow-Back</strong> (let implementation reshape artifacts).</li>
<li><strong>Bottom line:</strong> spec is doctrinally the source of truth, drift <em>is</em> detected, but everything is opt-in commands a human must remember to run; the only code-vs-spec write is appending a to-do.</li>
</ul>
<p><em>Source: templates/commands/analyze.md, converge.md; docs/guides/evolving-specs.md</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="17" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="workflow--steal--avoid">Workflow + steal / avoid</h2>
<p><strong>End-to-end (all <code>/speckit.*</code> slash commands):</strong></p>
<ol>
<li><code>specify init &lt;name&gt; --integration &lt;agent&gt;</code> — scaffold <code>.specify/</code> + agent commands (non-interactive default: Copilot)</li>
<li><code>/speckit.constitution</code> — author/refresh <code>.specify/memory/constitution.md</code></li>
<li><code>/speckit.specify &quot;&lt;what/why&gt;&quot;</code> → makes <code>specs/00N-slug/spec.md</code> (no tech)</li>
<li><code>/speckit.clarify</code> (recommended) — resolve <code>[NEEDS CLARIFICATION]</code> pre-plan</li>
<li><code>/speckit.plan &quot;&lt;tech&gt;&quot;</code> → <code>plan.md</code> (+ research/data-model/contracts/quickstart)</li>
<li><code>/speckit.tasks</code> → <code>tasks.md</code>, <code>[P]</code> parallel markers, dependency order</li>
<li><code>/speckit.analyze</code> (optional gate) · <code>/speckit.checklist</code> (optional)</li>
<li><code>/speckit.implement</code> — parse tasks, run in dependency order · <code>/speckit.taskstoissues</code> (optional)</li>
<li><code>/speckit.converge</code> (maintenance) — append a Convergence phase</li>
</ol>
<p><em>Also: a YAML workflow engine (command/prompt/shell/gate/if/switch/while/fan-out…) chains steps with human checkpoints; state persists for resume.</em></p>
<table>
<thead>
<tr>
<th>Steal</th>
<th>Avoid</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>/analyze</code>'s deterministic, rerunnable 6-pass audit + coverage matrix + 4 severity tiers — <strong>but extend to compare spec vs real CODE</strong></td>
<td>The reconciliation gap: artifact-only <code>/analyze</code> + append-only <code>/converge</code>, no CI/hook — make drift a <strong>mechanical gate that can fail</strong></td>
</tr>
<tr>
<td><code>constitution.md</code> as a persistent home for non-negotiable MUST rules</td>
<td>Append-only convergence as the answer to drift — actually <strong>re-project the spec from code</strong></td>
</tr>
<tr>
<td><code>converge</code>'s 4-way gap vocab: <strong>missing / partial / contradicts / unrequested</strong></td>
<td>3 competing evolving-spec models with no default — pick one ritual</td>
</tr>
<tr>
<td><code>[NEEDS CLARIFICATION:]</code> markers + a dedicated <code>/clarify</code> phase</td>
<td>Treating Given/When/Then prose as &quot;testing&quot; — <code>/implement</code> has no boot-and-verify gate</td>
</tr>
<tr>
<td>P1/P2/P3 independently-testable MVP slices; abstraction enforcement (tech out of spec)</td>
<td>Heavy Python/uv + bash/PowerShell toolchain if work can live in-agent; <code>init --here --force</code> clobbering <code>constitution.md</code></td>
</tr>
</tbody>
</table>
<p><em>Source: github/spec-kit README; docs/reference/workflows.md</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="18" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h1 id="aws-kiro">AWS Kiro</h1>
<h3 id="the-spec-driven-agentic-ide--kirospecsfeature-as-the-unit-of-work">The spec-driven agentic IDE — <code>.kiro/specs/&lt;feature&gt;/</code> as the unit of work</h3>
<p><em>An AWS agentic IDE on Code OSS (+ a Kiro CLI) where a three-file spec drives the build, gated by phase approvals.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="19" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="what-it-is--the-layout">What it is + the layout</h2>
<ul>
<li><strong>AWS agentic IDE</strong> built on Code OSS / VS Code; also ships a <strong>Kiro CLI</strong> that speaks the open Agent Client Protocol (ACP).</li>
<li><strong>Unit of work = a spec folder</strong>, not a chat. Each feature gets a committed <code>.kiro/specs/&lt;feature&gt;/</code> directory; project context lives in <code>.kiro/steering/</code>.</li>
<li>Everything is <strong>plain markdown, committed to git</strong>, so it travels with the repo.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>.kiro/
  steering/                 # persistent context, injected into interactions
    product.md              # purpose, users, key features, objectives
    tech.md                 # frameworks, libraries, constraints
    structure.md            # file org, naming, import &amp; arch patterns
    api-standards.md        # custom steering (e.g. testing-standards.md)
  specs/
    &lt;feature-name&gt;/
      requirements.md       # user stories + EARS criteria (or bugfix.md)
      design.md             # architecture, mermaid, interfaces, schemas
      tasks.md              # numbered, dependency-linked checklist
</code></pre>
<ul>
<li>Workspace scope <code>.kiro/</code> at repo root; global scope <code>~/.kiro/</code>.</li>
<li><em>Source: kiro.dev/docs/steering, /docs/getting-started/first-project (&quot;.kiro folder containing specs and steering files&quot;)</em></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="20" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="the-spec-format-requirements-%E2%86%92-design-%E2%86%92-tasks--ears">The spec format: requirements → design → tasks (+ EARS)</h2>
<p>Three artifacts, each a distinct <strong>approval-gated phase</strong>:</p>
<table>
<thead>
<tr>
<th>File</th>
<th>Content</th>
<th>Grammar</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>requirements.md</code></td>
<td>User stories <code>As a &lt;role&gt;, I want &lt;x&gt;, so that &lt;y&gt;</code> + acceptance criteria</td>
<td><strong>EARS</strong></td>
</tr>
<tr>
<td><code>design.md</code></td>
<td>Architecture, mermaid/sequence diagrams, component interfaces, data models, API endpoints, error handling</td>
<td>—</td>
</tr>
<tr>
<td><code>tasks.md</code></td>
<td>Numbered, dependency-linked checklist; each task links to related requirements</td>
<td>checkbox markers</td>
</tr>
</tbody>
</table>
<p><strong>EARS</strong> (Easy Approach to Requirements Syntax) — Kiro documents the primary template prominently:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>WHEN &lt;condition/event&gt; THE SYSTEM SHALL &lt;expected behavior&gt;
</code></pre>
<ul>
<li>Fuller EARS standard (Ubiquitous SHALL · Event WHEN · State WHILE · Optional WHERE · Unwanted IF…THEN) is <strong>EARS-standard context</strong>, not enumerated in Kiro's own docs.</li>
<li>Task markers: <code>- [ ]</code> not started · <code>- [-]</code> in progress · <code>- [x]</code> complete. Bugfixes use <code>bugfix.md</code> (current vs. expected behavior) instead of user stories.</li>
<li><em>Source: kiro.dev/docs/specs, /docs/specs/feature-specs, /blog/introducing-kiro</em></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="21" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="reconciliation-first-class-but-advisory">Reconciliation: first-class, but advisory</h2>
<p>Spec and code are kept in sync <strong>on demand</strong>, framed as &quot;living documentation&quot; — there is <strong>no continuous drift detector and no CI gate</strong>.</p>
<ul>
<li><strong>Sync Files</strong> (in <code>tasks.md</code>): Kiro &quot;automatically marks completed tasks&quot; against the code.</li>
<li><strong>Conversational reconcile</strong>: ask &quot;Check which tasks are already complete&quot; → Kiro analyzes the codebase and identifies implemented functionality.</li>
<li><strong>Iterative refinement</strong>: update requirements → refine design → re-sync to &quot;create new tasks that map to the new requirements&quot;. Design-First and code-first variants derive artifacts from existing design/code.</li>
<li><strong>Analyze Requirements</strong>: authoring-time check surfacing &quot;logical inconsistencies, ambiguities, conflicting constraints, and gaps&quot; before design.</li>
</ul>
<blockquote>
<p>Net: bidirectional and human-triggered — a strong primitive, but <strong>advisory only</strong>. Specs can silently rot if no one clicks Sync. <em>(Steering-as-code-review governance is NOT stated by Kiro's current docs.)</em></p>
</blockquote>
<ul>
<li><em>Source: kiro.dev/docs/specs/best-practices</em></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="22" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="workflow--steal--avoid-1">Workflow + steal / avoid</h2>
<p><strong>End-to-end:</strong> open project (IDE or <code>kiro-cli acp</code>) → <strong>Generate Steering Docs</strong> → create spec from plain-English prompt (&quot;Add a user authentication system with login, logout, password reset&quot;) → pick a variant:</p>
<ul>
<li><strong>Requirements-First</strong> (default) · <strong>Design-First</strong> · <strong>Quick Plan</strong> (all phases, <strong>no approval gates</strong>).</li>
</ul>
<p>Then <strong>Requirements → Design → Tasks</strong> (each review + approve) → <strong>Execute</strong>: Kiro builds a dependency graph and runs in <strong>waves</strong> (&quot;Waves execute sequentially; tasks within a wave execute concurrently&quot;). <strong>Agent Hooks</strong> automate side effects (save → update tests; pre-commit → scan creds); <strong>MCP</strong> adds tools.</p>
<table>
<thead>
<tr>
<th>Steal</th>
<th>Avoid</th>
</tr>
</thead>
<tbody>
<tr>
<td>3-phase artifact split as separate committed files per feature</td>
<td>Treating <code>[x]</code> as proof of correctness — pair every task with an executable proof gate</td>
</tr>
<tr>
<td>EARS as a testable acceptance grammar</td>
<td>Manual/advisory reconcile — detect drift continuously and <strong>fail closed</strong></td>
</tr>
<tr>
<td>Approval gates + a graduated bypass (not all-or-nothing)</td>
<td>Coupling spec workflow to one IDE's buttons; keep it tool-neutral (ACP is the right move)</td>
</tr>
<tr>
<td>Design phase reads the <strong>real codebase</strong> before designing</td>
<td>Brittle in-band status markers gating execution (bug #8859: agent reads <code>[-]</code> and refuses to run)</td>
</tr>
<tr>
<td>Steering files with scoped injection (always / fileMatch glob / manual / auto)</td>
<td>Conventional-only traceability — enforce every requirement maps to a task <strong>and a test</strong></td>
</tr>
</tbody>
</table>
<ul>
<li><em>Source: kiro.dev/docs/specs, /docs/cli/acp, github.com/kirodotdev/Kiro/issues/8859</em></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="23" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h1 id="tessl--the-emerging-sdd-landscape">Tessl &amp; the Emerging SDD Landscape</h1>
<p>A field guide for design decisions: what to steal, what to avoid</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="24" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="tessl--what-it-is-and-which-generation-youre-copying">Tessl — what it is, and which generation you're copying</h2>
<p>Tessl makes the <strong>spec the durable source-of-truth</strong> and treats code/tests as regenerable projections. There are <strong>two distinct generations</strong> — confusing them is the #1 design error.</p>
<table>
<thead>
<tr>
<th></th>
<th>Gen 1 — &quot;Tessl Framework&quot; (beta)</th>
<th>Gen 2 — current, shipping</th>
</tr>
</thead>
<tbody>
<tr>
<td>Model</td>
<td>Spec-as-source <strong>code generator</strong></td>
<td><strong>Agent-enablement platform</strong>: package manager + eval tools for reusable agent context (Skills/Rules/Plugins)</td>
</tr>
<tr>
<td>SDD delivery</td>
<td>Built into the framework</td>
<td>Installable plugin: <code>tessl-labs/spec-driven-development</code> (formerly a &quot;tile&quot;)</td>
</tr>
<tr>
<td>Spec<img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/>code</td>
<td><strong>1:1</strong> <code>.spec.md</code> → one generated file, marked <code>// GENERATED FROM SPEC - DO NOT EDIT</code></td>
<td>Spec governs code via <code>targets:</code> globs; humans edit code, then reconcile</td>
</tr>
<tr>
<td>What's reviewed publicly</td>
<td>Böckeler's Fowler-site review</td>
<td>The methodology plugin (generation engine stays closed)</td>
</tr>
</tbody>
</table>
<ul>
<li>Gen 2 is <strong>agent-agnostic</strong>: ships a Tessl MCP server + Skills/Rules that plug into Claude Code, Cursor, etc.</li>
<li>A <strong>tile→plugin migration is in progress</strong> (<code>tile.json</code> → <code>.tessl-plugin/plugin.json</code>); both coexist, so 3rd-party write-ups describe different systems.</li>
</ul>
<p><em>Source: martinfowler.com/articles/exploring-gen-ai/sdd-3-tools.html (Böckeler, 2025-10-15); docs.tessl.io/introduction-to-tessl/how-tessl-works</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="25" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="tessl--on-disk-layout-gen-2">Tessl — on-disk layout (Gen 2)</h2>
<p><code>tessl init [--agent &lt;name&gt;]</code> configures the host agent and writes a manifest.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>tessl.json              # {name:&quot;workspace/project&quot;, mode:&quot;managed&quot;|&quot;vendored&quot;,
                        #  dependencies:{&quot;workspace/plugin&quot;:&quot;version&quot;}}
.tessl/
  .gitignore            # auto-managed by mode
  RULES.md              # GENERATED, consolidated plugin rules — never committed
  plugins/&lt;workspace&gt;/&lt;plugin&gt;/
    .tessl-plugin/plugin.json
    skills/  rules/
CLAUDE.md               # context file w/ Tessl MCP instructions
AGENTS.md               # if present, Tessl appends ref to .tessl/RULES.md (&lt;!-- tessl-managed --&gt;)
.mcp.json               # Tessl-managed MCP config (Claude Code)
specs/                  # *.spec.md files (verification skill globs specs/ -name &quot;*.spec.md&quot;)
</code></pre>
<ul>
<li><strong><code>managed</code></strong> = plugin contents gitignored like <code>node_modules</code> (run <code>tessl install</code> after clone). <strong><code>vendored</code></strong> = committed.</li>
<li>The SDD plugin repo (<code>github.com/tesslio/spec-driven-development-tile</code>, active, ~41★, <strong>not archived</strong>) ships: <strong>4 skills</strong> (requirement-gathering, spec-writer, spec-verification, work-review), <strong>3 rules</strong> (spec-before-code, one-question-at-a-time, spec-format-compliance), <code>docs/</code> (spec-format.md, spec-styleguide.md), <code>scripts/</code> (validate-specs.sh, check-spec-links.sh), <code>evals/</code> (9 scenarios).</li>
</ul>
<p><em>Source: docs.tessl.io/reference/configuration; github.com/tesslio/spec-driven-development-tile</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="26" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="tessl--spec-format--the-test-mechanic">Tessl — spec format &amp; the [@test] mechanic</h2>
<p>Specs are Markdown, <code>.spec.md</code> extension, <strong>YAML frontmatter</strong>. <code>targets:</code> is <strong>required</strong> (≥1 path or glob — the code the spec governs).</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-markdown">---
name: Database Architecture
description: Key design patterns used across our data models
targets:
<span class="hljs-section">  - ../src/models/<span class="hljs-strong">**/<span class="hljs-emphasis">*.py
---
## Soft deletes
Records are never hard-deleted; `deleted_at` is stamped...
[@test] ../tests/models/test_soft_delete.py
</span></span></span></code></pre>
<ul>
<li><strong>Inline test linking</strong> is the defining move: <code>[@test]</code> sits <strong>next to the requirement it verifies</strong> → mechanical spec<img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/>test traceability.</li>
<li>Body = context-rich prose under one heading per feature area (behaviors, edge cases, errors, optional API-contract block).</li>
<li><strong>No EARS notation. No Kiro-style requirements/design/tasks split</strong> — Böckeler notes Tessl works &quot;at quite low abstraction level, per code file.&quot;</li>
<li>Caveat on the famous line: <em>&quot;specs don't need a specific format&quot;</em> is <strong>marketing-blog framing</strong> (Debois), not the plugin docs — <code>spec-format.md</code>/<code>spec-styleguide.md</code> actually <strong>prescribe</strong> conventions.</li>
</ul>
<p><em>Source: spec-format.md + spec-writer/SKILL.md (tesslio/spec-driven-development-tile); Debois blog &quot;10 things you need to know about specs&quot;, 2025-10-29</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="27" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="tessl--reconciliation-the-headline-differentiator">Tessl — reconciliation: the headline differentiator</h2>
<p>The <strong>spec-verification skill</strong> is the most stealable part — a runnable, 6-step drift loop:</p>
<ol>
<li><strong>Find all specs</strong> — <code>find specs/ -name &quot;*.spec.md&quot;</code></li>
<li><strong>Validate structural integrity</strong> — every <code>targets:</code> resolves, every <code>[@test]</code> points to a real test (<code>validate-specs.sh</code>, <code>check-spec-links.sh</code>)</li>
<li><strong>Run linked tests</strong> — execute referenced files, diagnose failures</li>
<li><strong>Spot-check targets for drift</strong> — read code vs documented behavior</li>
<li><strong>Check drift signals</strong> — behavior changed but spec didn't · orphan test, no requirement · requirement, no test · renamed/deleted file still referenced · undocumented code path</li>
<li><strong>Fix drift</strong> — emit a structured report</li>
</ol>
<p>The &quot;spec-as-source registry&quot; idea: Gen-1 launched a <strong>Spec/Usage Registry</strong> (Sept 2025, &quot;10,000+ pre-built specs&quot;) of version-accurate library APIs to kill API hallucination; Gen-2 registry &quot;evaluated 2,000+ public skills against best practices.&quot;</p>
<blockquote>
<p><strong>Two honest caveats.</strong> Regeneration is <strong>non-deterministic</strong> (Böckeler: same spec → different code across runs) — it's iterative, not a round-trip. And step 6 <strong>defaults to editing the SPEC to match code</strong> — an agent can quietly rewrite intent to match a <em>buggy</em> implementation unless a human gates it.</p>
</blockquote>
<p><em>Source: spec-verification/SKILL.md; Böckeler (Fowler site); tessl.io/blog launch, 2025-09-23</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="28" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="tessl--steal-vs-avoid">Tessl — steal vs. avoid</h2>
<table>
<thead>
<tr>
<th>Steal</th>
<th>Avoid</th>
</tr>
</thead>
<tbody>
<tr>
<td>The spec-verification <strong>drift loop as a mechanical gate</strong> (resolve globs → assert links → <strong>run tests</strong> → spot-check → report)</td>
<td>Promising <strong>deterministic</strong> &quot;regenerate code from spec&quot; — their own review shows non-determinism</td>
</tr>
<tr>
<td><strong>Inline <code>[@test]</code></strong> per requirement → checkable, not aspirational, traceability</td>
<td>Rigid <strong>1:1 spec-per-file</strong> granularity (Böckeler: risks &quot;inflexibility AND non-determinism&quot; of MDD+LLMs)</td>
</tr>
<tr>
<td><strong><code>targets:</code> globs</strong> binding a spec to the exact code it governs → scoped per-spec checks</td>
<td>Auto-&quot;fix drift&quot; by <strong>defaulting to rewrite-the-spec</strong> — require a human call on who's authoritative</td>
</tr>
<tr>
<td>Ship gates as <strong>plain shell scripts</strong> in-repo (agent-agnostic, runs in any CI)</td>
<td>Importing the <strong>SaaS surface</strong> (registry accounts, workspaces, orgs, login/api-keys, eval projects)</td>
</tr>
<tr>
<td>Keep a <strong>code→spec recovery</strong> step (Gen-1 <code>@describe</code>) — re-project spec from reality, not just forward</td>
<td><code>GENERATED … DO NOT EDIT</code> <strong>frozen-output</strong> markers — expect edits, then reconcile</td>
</tr>
<tr>
<td>Lightweight Markdown+frontmatter; <em>&quot;tests define intent too&quot;</em></td>
<td>Tying reconciliation to a <strong>proprietary MCP / mid-churn packaging</strong> (tile.json vs plugin.json)</td>
</tr>
</tbody>
</table>
<ul>
<li><strong>Workflow worth borrowing</strong>: spec-before-code rule + <strong>one-question-at-a-time</strong> requirement gathering + a <strong>single human approval gate</strong> before implementation.</li>
<li><strong>Don't drop why-level traceability entirely</strong> just because Tessl does — some rationale layer helps when code and spec disagree.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="29" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="the-rest-of-the-sdd-landscape">The rest of the SDD landscape</h2>
<p>Where the field is converging — and each tool's single most notable idea.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="30" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="emerging-sdd-tools--landscape">Emerging SDD tools — landscape</h2>
<table>
<thead>
<tr>
<th>Tool</th>
<th>Category</th>
<th>Single most notable idea</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>BMAD-METHOD</strong></td>
<td>Agile-team-as-agents (OSS)</td>
<td>Up-front PM/Architect agents → <strong>&quot;shard&quot;</strong> PRD+arch into self-contained per-story files carrying full context to the dev agent (no planning→impl context loss)</td>
</tr>
<tr>
<td><strong>AGENTS.md</strong> (Linux Fdn)</td>
<td>Tool-agnostic standard</td>
<td>&quot;README for agents&quot; with <strong>nearest-file-wins precedence</strong> down the tree; 60k+ repos, 20+ agents</td>
</tr>
<tr>
<td><strong>Cursor / Windsurf Rules</strong></td>
<td>IDE rules-as-config</td>
<td><code>.cursor/rules/*.mdc</code> carry <strong>globs + <code>alwaysApply</code> + agent-requested</strong> metadata → composable, scoped context vs one monolithic prompt</td>
</tr>
<tr>
<td><strong>Conductor</strong> (Google, Gemini CLI)</td>
<td>Context-driven dev</td>
<td>Specs/plans <strong>persist as Markdown beside code</strong>; engineer shifts from coder → orchestrator</td>
</tr>
<tr>
<td><strong>Conductor.build</strong></td>
<td>Parallel-agent macOS app</td>
<td><strong>Git-worktree isolation per agent</strong> → concurrent agents never collide, reviewable merge</td>
</tr>
<tr>
<td><strong>Intent / Cosmos</strong> (Augment)</td>
<td>Multi-agent spec workspace</td>
<td>One <strong>living spec</strong> drives Coordinator→Specialists→<strong>Verifier</strong>; checked vs spec before merge; Context Engine over 400k+ files</td>
</tr>
<tr>
<td><strong>Task Master</strong></td>
<td>Spec decomposition (MIT)</td>
<td>PRD → <strong>dependency-aware task graph</strong>; AI PM inside Cursor/Windsurf/Roo</td>
</tr>
<tr>
<td><strong>GSD</strong></td>
<td>Spec-driven framework</td>
<td>Differentiates on <strong>execution/orchestration depth</strong> of the specify-plan-execute-verify loop</td>
</tr>
<tr>
<td><strong>DSPy</strong> (Stanford)</td>
<td>Program-not-prompt LLMs</td>
<td>The <strong>signature as executable spec</strong> (<code>question -&gt; answer</code>); compiler/teleprompter auto-tunes prompts</td>
</tr>
<tr>
<td><strong>TDD-for-LLMs</strong></td>
<td>Research/benchmarks</td>
<td><strong>Tests as the executable truth</strong> — supplied as both instruction and verifier (TiCoder, arXiv:2402.13521)</td>
</tr>
<tr>
<td><strong>PRPM</strong></td>
<td>Cross-tool registry</td>
<td>&quot;<strong>npm for AI coding tools</strong>&quot; — prompts/rules/skills/agents as installable, versioned deps</td>
</tr>
</tbody>
</table>
<ul>
<li><strong>Convergent core loop</strong>: specify → plan → decompose → execute → verify. Differentiation is in <em>which stage</em> each tool deepens.</li>
<li><strong>Three frontiers to watch</strong>: (1) portable context standards (AGENTS.md, PRPM); (2) safe multi-agent parallelism (worktree isolation); (3) compiled/test-as-spec (DSPy, TDD-for-LLMs) where the spec is <em>executed</em>, not hand-written.</li>
</ul>
<p><em>Sources: github.com/bmad-code-org/bmad-method · agents.md · docs.cursor.com/context/rules · developers.googleblog.com (Conductor) · conductor.build · augmentcode.com/blog/intent · github.com/eyaltoledano/claude-task-master · github.com/stanfordnlp/dspy · arxiv.org/abs/2402.13521 · github.com/pr-pm/prpm</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="31" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h1 id="academic-rigor">Academic Rigor</h1>
<h2 id="what-the-literature-demands-of-a-spec-driven-system--and-how-this-harness-answers-it">What the literature demands of a spec-driven system — and how this harness answers it</h2>
<p><em>Requirements engineering · formal vs. lightweight specs · spec/code drift · &quot;spec as source code&quot; · verification &amp; proof</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="32" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="the-core-inversion">The core inversion</h2>
<ul>
<li><strong>Traditional spec:</strong> a document humans read, then drift away from.</li>
<li><strong>Spec-driven (SDD) spec:</strong> an artifact that <em>executes</em> as a validation gate in CI — it fails the build when reality diverges.</li>
<li>The contested question every team must answer <strong>deliberately</strong>:</li>
</ul>
<table>
<thead>
<tr>
<th>Camp</th>
<th>Source of truth</th>
<th>Code is…</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Radical</strong> (Grove/OpenAI)</td>
<td>the spec</td>
<td>a regenerable byproduct</td>
</tr>
<tr>
<td><strong>Conservative</strong> (Thoughtworks)</td>
<td>the spec as <em>behavioral contract</em></td>
<td>the maintained, runnable artifact</td>
</tr>
</tbody>
</table>
<ul>
<li>Thoughtworks rates SDD <strong>&quot;Assess&quot;</strong> (promising, unproven) and names the antipattern: <em>heavy upfront specs + big-bang releases</em> = waterfall in disguise.</li>
</ul>
<p><em>Source: arXiv 2602.00180 &quot;From Code to Contract&quot;; thoughtworks.com/radar/techniques/spec-driven-development</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="33" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="requirements-engineering-ears">Requirements engineering: EARS</h2>
<p>Unconstrained natural language is the dominant source of ambiguity, vagueness, and incompleteness. <strong>EARS</strong> (Alistair Mavin et al., Rolls-Royce, IEEE RE'09) constrains prose into a fixed clause order and a tiny keyword vocabulary.</p>
<p>Grammar: <code>WHILE &lt;precondition(s)&gt;, WHEN &lt;trigger&gt;, the &lt;system&gt; SHALL &lt;response(s)&gt;</code></p>
<blockquote>
<p>0+ preconditions · 0–1 trigger · exactly one system name · 1+ responses</p>
</blockquote>
<table>
<thead>
<tr>
<th>Template</th>
<th>Pattern</th>
</tr>
</thead>
<tbody>
<tr>
<td>Ubiquitous</td>
<td><code>The &lt;system&gt; shall &lt;response&gt;</code></td>
</tr>
<tr>
<td>State-driven</td>
<td><code>WHILE &lt;state&gt;, the &lt;system&gt; shall &lt;response&gt;</code></td>
</tr>
<tr>
<td>Event-driven</td>
<td><code>WHEN &lt;trigger&gt;, the &lt;system&gt; shall &lt;response&gt;</code></td>
</tr>
<tr>
<td>Optional-feature</td>
<td><code>WHERE &lt;feature&gt;, the &lt;system&gt; shall &lt;response&gt;</code></td>
</tr>
<tr>
<td>Unwanted-behaviour</td>
<td><code>IF &lt;trigger&gt;, THEN the &lt;system&gt; shall &lt;response&gt;</code></td>
</tr>
</tbody>
</table>
<p><em>Source: alistairmavin.com/ears/</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="34" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="ears-in-practice-and-why-it-matters-here">EARS in practice (and why it matters here)</h2>
<p>Each EARS line names <strong>one condition + one testable response</strong> → it maps almost 1:1 to an acceptance test. That is exactly what makes drift <em>mechanically detectable</em>.</p>
<p>Our <code>examples/calc-agent/spec/calc-agent.md</code> is already EARS-shaped prose — rewritten to template:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Event-driven:    WHEN a function_call part is present, the agent shall
                 call calculator(**fc.args) and append the result.
Unwanted:        IF the tool raises, THEN the agent shall feed back
                 &quot;error: {e}&quot; rather than propagate the exception.
Unwanted:        IF max_steps is reached with no text answer, THEN the
                 agent shall return &quot;(ran out of steps)&quot;.
Ubiquitous:      The calculator shall reject any AST node outside
                 {const, +,-,*,/,**,%, unary} with ValueError.
</code></pre>
<p>Each line is asserted by a keyless test — the spec becomes the test oracle.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="35" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="formal-vs-lightweight-a-deliberate-spectrum">Formal vs. lightweight: a deliberate spectrum</h2>
<table>
<thead>
<tr>
<th>Approach</th>
<th>Cost</th>
<th>What it buys</th>
<th>Where to use</th>
</tr>
</thead>
<tbody>
<tr>
<td>Prose / PRD</td>
<td>low</td>
<td>readability</td>
<td>never the sole contract</td>
</tr>
<tr>
<td><strong>EARS / Spec-by-Example</strong></td>
<td>low</td>
<td>testable clauses</td>
<td>every behavioral req</td>
</tr>
<tr>
<td><strong>Types / contracts / properties</strong></td>
<td>medium</td>
<td>machine-checkable, self-syncing</td>
<td>most of the system</td>
</tr>
<tr>
<td><strong>TLA+ / formal</strong></td>
<td>high</td>
<td>bugs <em>no test or review finds</em></td>
<td>the hard core only</td>
</tr>
</tbody>
</table>
<ul>
<li><strong>AWS</strong> has run TLA+ in production since 2011 (DynamoDB, S3): formal methods find subtle design bugs and let engineers &quot;verify deep changes are safe — or learn they are unsafe — without doing harm.&quot;</li>
<li>Scope it to <strong>concurrency, distributed protocols, agent control loops, irreversible ops</strong>. Over-formalizing everywhere re-creates waterfall.</li>
</ul>
<p><em>Source: cacm.acm.org/research/how-amazon-web-services-uses-formal-methods/</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="36" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="tests-types-properties-as-the-spec">Tests, types, properties AS the spec</h2>
<blockquote>
<p>&quot;Unit tests enumerate a handful of examples; a property/contract states the rule itself.&quot; — Hillel Wayne</p>
</blockquote>
<ul>
<li><strong>Preconditions</strong> (must hold on entry) · <strong>postconditions</strong> (guaranteed on exit) · <strong>invariants</strong> (always hold).</li>
<li>Property-based testing explores hundreds of inputs while contracts assert correctness across deep call chains → <strong>integration coverage &quot;for free.&quot;</strong></li>
<li>When code diverges, the property <em>fails</em> — the spec cannot silently lie.</li>
</ul>
<p>Our calc-agent spec already states a true <strong>safety invariant</strong>, not examples:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Safety property: only {const, binary +-*/**%, unary +/-} are evaluated.
Any other node — names, calls, attribute access — raises ValueError
BEFORE evaluation; eval/exec are never used.
So  x + 1  and  __import__('os').system('echo hi')  are rejected.
</code></pre>
<p><em>Source: hillelwayne.com/pbt-contracts/</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="37" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="speccode-drift--reconciliation">Spec/code drift &amp; reconciliation</h2>
<p>Drift — code behavior diverging from its documented contract — is <em>&quot;inherently difficult to avoid&quot;</em> and <strong>compounds silently</strong> under periodic review. The research consensus: a <strong>commit-time gate</strong>, not a quarterly audit.</p>
<p>The four-part reconciliation discipline:</p>
<ol>
<li>Any behavior change updates <strong>both</strong> spec and code in the <strong>same</strong> change (sync-owner-gate).</li>
<li>Make the spec <strong>executable</strong> so divergence trips a test immediately (EARS / examples / contracts).</li>
<li>For structural contracts, run <strong>automated spec-vs-code comparison</strong> (OpenAPI/route/model diff).</li>
<li>On detection, <strong>force resolution before merge</strong> — fail CI, auto-open a PR, or notify.</li>
</ol>
<p>Drift-resistant <em>by construction</em>: literate programming (one source) and tests-as-spec (the spec is the passing check).</p>
<p><em>Source: github.com/ChrysKoum/SpecSync; wasowski &quot;sync-owner-gate&quot;</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="38" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="verification--proof--mapping-our-gate-to-the-literature">Verification &amp; proof — mapping our gate to the literature</h2>
<p>Academic verification asks: <em>does the system meet its spec, observed — not asserted?</em> Our <strong>proof-gate</strong> (<code>.claude/skills/proof-gate/SKILL.md</code>) is that discipline operationalized:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>1. Boot it.        Start the app for real (not just import).
2. Run the change. Exercise the new behaviour end-to-end.
3. Judge the OUTCOME, not the status.  A 200 with a wrong answer is a FAIL.
4. Bind every acceptance criterion to a real check.
                   An unbound criterion is not done.
</code></pre>
<table>
<thead>
<tr>
<th>Academic concept</th>
<th>Our mechanism</th>
</tr>
</thead>
<tbody>
<tr>
<td>Spec as oracle</td>
<td>EARS-style acceptance check (<code>…returns answer containing 396</code>)</td>
</tr>
<tr>
<td>Soundness (&quot;no false pass&quot;)</td>
<td>&quot;Never report a pass you didn't run&quot;</td>
</tr>
<tr>
<td>LLM-judged output</td>
<td>sample the judge, require a stable majority</td>
</tr>
<tr>
<td>Coverage of obligations</td>
<td>every criterion bound to a running test</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="39" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="lineage-literate--intent-programming">Lineage: literate &amp; intent programming</h2>
<ul>
<li><strong>Knuth, literate programming (1984):</strong> author the program as an <em>explanation of intent</em> interleaved with code, in human reasoning order. One source <strong>tangles</strong> → runnable code, <strong>weaves</strong> → docs.</li>
<li>The original, durable answer to drift: intent and implementation are <em>the same file</em> — nothing separate to desync. The conceptual ancestor of &quot;spec as source of truth.&quot;</li>
<li><strong>Spec-by-Example / living documentation</strong> (Fowler 2002; Adzic, 50+ projects): derive specs from concrete domain-language scenarios, automate them as acceptance tests → the spec <strong>is</strong> the passing suite.</li>
<li>Fowler's caution: <em>tests are always incomplete</em> — supplement examples with types, contracts, and review.</li>
</ul>
<p><em>Source: literateprogramming.com/knuthweb.pdf; thoughtworks.medium.com spec-by-example</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="40" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="spec-as-source-code--the-discourse--the-voices">&quot;Spec as source code&quot; — the discourse &amp; the voices</h2>
<ul>
<li><strong>Sean Grove (OpenAI):</strong> code is a <em>&quot;lossy projection&quot;</em> of intent; code is ~10–20% of value, the other 80–90% is structured communication &amp; verification. Don't &quot;version the binary and shred the source.&quot; OpenAI's <strong>Model Spec</strong> (markdown) trains models, generates tests, and was a <em>&quot;trust anchor&quot;</em> during the sycophancy incident.</li>
<li><strong>Anthropic engineering:</strong> for AI agents the <strong>tool/spec description IS the execution context</strong> — wording-level changes alone moved SWE-bench error rates; iterate the spec via <em>evaluation-driven development</em>.</li>
</ul>
<table>
<thead>
<tr>
<th>Voice</th>
<th>Stance</th>
</tr>
</thead>
<tbody>
<tr>
<td>Grove / OpenAI</td>
<td>radical: spec is the fundamental unit</td>
</tr>
<tr>
<td>Thoughtworks</td>
<td>pragmatist: behavioral contract, beware over-formalization</td>
</tr>
<tr>
<td>Fowler / Adzic</td>
<td>spec lives as executable acceptance tests</td>
</tr>
<tr>
<td>Wayne; Lamport / AWS</td>
<td>contracts/properties/types &amp; TLA+ for the hard core</td>
</tr>
<tr>
<td>Knuth</td>
<td>literate: a document that contains the program</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="41" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="what-rigor-says-a-good-spec-driven-system-must-do">What rigor says a good spec-driven system MUST do</h2>
<ol>
<li><strong>Phrase requirements in EARS</strong> — one condition, one testable response per line → the proof-gate can assert each.</li>
<li><strong>Declare the authority</strong> — state in the harness that the spec is the human-readable <em>behavioral contract</em> and code is the runnable output (resolve radical-vs-conservative explicitly).</li>
<li><strong>Gate both directions</strong> — commit-time gate forward (spec+code together) <strong>and</strong> a <code>/sync</code> step that re-projects the spec from current code so it never rots.</li>
<li><strong>Make the spec executable</strong> — tests, contracts, properties, types; prove behavior, don't enumerate examples.</li>
<li><strong>Reserve formal methods for the hard core</strong> — agent control loops, irreversible ops; not everywhere.</li>
<li><strong>Iterate spec wording with evals</strong> — for AI-built parts, the spec is context; measure error rates.</li>
<li><strong>Stay small &amp; modular</strong> — avoid the &quot;curse of instructions&quot;; keep each unit reviewable and diffable.</li>
</ol>
<p><em>This is precisely the proof-first, spec-in-sync loop our <code>/new</code> and <code>/change</code> workflows enforce.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="42" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h1 id="our-repo-history--the-decisions-weve-made">Our Repo: History &amp; the Decisions We've Made</h1>
<p>A spec-driven harness that turns a one-line idea into a working agentic AI app — gated by mechanical <strong>proof</strong>, not by &quot;code matches a doc.&quot;</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="43" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="the-bloat-curve-fine--fast-%E2%86%92-overkill">The bloat curve: &quot;fine &amp; fast&quot; → &quot;overkill&quot;</h2>
<p>We grew the harness three times. Each version &quot;worked&quot; by its own bar, but the cost-to-understand outran the value.</p>
<table>
<thead>
<tr>
<th>Version</th>
<th>Size (md+py)</th>
<th>Verdict</th>
<th>Why</th>
</tr>
</thead>
<tbody>
<tr>
<td>v1 (early)</td>
<td>~3.7k lines</td>
<td>&quot;fine &amp; fast&quot;</td>
<td>thin, legible, did the job</td>
</tr>
<tr>
<td>v2 (recipes redo)</td>
<td>~5.7k lines</td>
<td>&quot;slower but worked&quot;</td>
<td>copyable recipes, more rigor</td>
</tr>
<tr>
<td>v3 (overnight autonomous rewrite)</td>
<td>~7.8k lines</td>
<td><strong>&quot;OVERKILL&quot;</strong></td>
<td>the owner could not explain his own repo's core mechanisms</td>
</tr>
</tbody>
</table>
<ul>
<li>The failure mode isn't a bug — it's <strong>unmanageable surface area</strong>.</li>
<li>A harness you can't reason about can't be safely changed.</li>
</ul>
<p><em>Source: line counts from our v1→v2→v3 history; v3 = HEAD commit <code>befd889</code>, PR #28.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="44" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="what-the-old-harness-did-and-its-real">What the old harness DID (and it's real)</h2>
<p>The v3 baseline (<code>befd889</code>, &quot;harness v3: proof-first spec-driven&quot;) is a Claude-Code-only, spec-driven harness. Its thesis: <strong>the only spec-driven tool that compiles and proves it ran.</strong></p>
<ul>
<li><code>/build &quot;&lt;idea&gt;&quot;</code> → one 4-question intake (API key + runtime model at Q4)</li>
<li>Fans out to sub-agents: <code>spec-writer</code>, <code>tech-designer</code>, <code>planner</code>, <code>spec-reviewer</code>, <code>plan-reviewer</code></li>
<li>Drafts a 4-file spec + <code>reports/implementation-plan.md</code>, runs a 6-check inline pre-flight</li>
<li><strong>One</strong> human approval (scope + stack + plan via AskUserQuestion), then runs <strong>unattended to a green gate</strong></li>
<li>Code generated fresh on <code>feature/&lt;slug&gt;-&lt;date&gt;</code> from recipes in <code>harness/patterns/</code></li>
<li><code>.claude/commands/</code>, <code>.claude/agents/</code>, <code>CLAUDE.md</code> generated from <code>harness/</code> by <code>harness/generate.py --check</code></li>
</ul>
<p><em>Source: <code>git show befd889:harness/harness.md</code>.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="45" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="the-two-zone-honesty-model">The two-zone honesty model</h2>
<p>The architecture rests on an explicit split — and deliberately does <strong>not</strong> claim &quot;pure spec-as-source end to end&quot; because the repo couldn't back that claim.</p>
<table>
<thead>
<tr>
<th>Zone</th>
<th>Source of truth</th>
<th>Contents</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Tested CORE</strong> (reused, version-pinned)</td>
<td><strong>CODE</strong></td>
<td>async FastAPI server, ReAct/LangGraph loop (<code>force_finalize</code>, max-iter sizing, AST action-safety), <code>ok()/api_error()</code> envelope, session-scoped resources, <code>/traces</code> dashboard, the gate harness, UI shell, SQLite</td>
</tr>
<tr>
<td><strong>Generated DOMAIN</strong></td>
<td><strong>SPEC</strong></td>
<td>capability nodes, tools, prompts, EARS evals, domain UI screens</td>
</tr>
</tbody>
</table>
<ul>
<li><code>/build</code> <strong>configures</strong> the core, never regenerates it (like a framework dependency).</li>
<li>Two-zone also governs <strong>who you fix</strong> on a red check: core rule → fix the recipe; domain rule → fix the spec.</li>
</ul>
<p><em>Source: <code>git show befd889:harness/harness.md</code>, <code>spec/constitution.md</code>.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="46" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="the-spec-format-ears--eval-binding">The spec format: EARS + <code>[@eval]</code> binding</h2>
<p>A 4-file input contract plus an inherited, versioned constitution (<code>Version 1.0.0</code>, ~30 MUST/SHOULD rules, each bound to a mechanical owner).</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>spec/product.md          # what it does, success criteria, out-of-scope
spec/capabilities/*.md   # one per capability — EARS criteria, P1/P2/P3
spec/agent.md            # on/off layer ledger; every ON layer traces to a capability
spec/tech-stack.md       # provider, runtime model, sqlite+aiosqlite, deploy target
spec/constitution.md     # inherited; rules A–F, each -&gt; a gate line / hook / lint / test
</code></pre>
<p>Every acceptance line is EARS <strong>and</strong> carries an executable binding token:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>WHILE a file is loaded ... SHALL retain the uploaded file context
across turns ... [@eval: tests/test_file_retention.py::test_file_retention]
</code></pre>
<ul>
<li>Priorities: exactly <strong>one P1</strong> (the live capability); P2/P3 are deterministic journey-complete <strong>stubs</strong>, never silent gaps.</li>
</ul>
<p><em>Source: <code>git show d6def4a:spec/capabilities/file-analysis.md</code>.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="47" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="the-mechanical-gate-done--exit-0">The mechanical gate: &quot;done&quot; = exit 0</h2>
<p><code>make gate</code> exits 0 is the <strong>only</strong> definition of done. Two tiers; PROD is a strict superset of DEMO. The DEMO gate is genuinely outcome-based — <strong>a 200 with a wrong answer FAILS.</strong></p>
