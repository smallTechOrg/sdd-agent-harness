<table>
<thead>
<tr>
<th>#</th>
<th>DEMO check</th>
<th>Verdict</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td><code>[@eval]</code> lint — every EARS line resolves to an AST-collectable case</td>
<td>exit code</td>
</tr>
<tr>
<td>2</td>
<td><code>uv run pytest</code> — FakeModel loop (≥2 iter, tool spans, <code>force_finalize</code>) + judge test + Playwright</td>
<td>exit code</td>
</tr>
<tr>
<td>3–4</td>
<td>server boots <code>python -m agent</code>; <code>/health</code> = <code>{&quot;ok&quot;:true}</code></td>
<td>exit code</td>
</tr>
<tr>
<td>5</td>
<td><strong>two-turn</strong> run on one session — any Q2 error fails even if Q1 was perfect</td>
<td>exit code</td>
</tr>
<tr>
<td>6</td>
<td>judge-stable outcome eval — <code>SAMPLES=5</code>, mean ≥ <code>THRESHOLD - MARGIN</code></td>
<td>exit code</td>
</tr>
<tr>
<td>7</td>
<td>Playwright UI — post-JS DOM contains a <strong>real expected value</strong>, not just non-empty</td>
<td>exit code</td>
</tr>
<tr>
<td>8</td>
<td><code>/traces</code> renders ≥1 run with that run's spans (grep <code>RUN_ID</code>)</td>
<td>exit code</td>
</tr>
</tbody>
</table>
<p><em>Source: <code>git show befd889:harness/workflows/gates.md</code> (31.8KB).</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="48" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="what-worked--the-baseline-bar-we-keep">What WORKED — the baseline bar we keep</h2>
<p>The old harness drove <strong>real apps to a green mechanical gate.</strong> That is the bar.</p>
<ul>
<li><strong>Data-analysis agent</strong> — <code>d6def4a</code>, branch <code>feature/data-analysis-2026-06-20</code>: commit msg <em>&quot;gate exits 0 (all 8 checks pass)&quot;</em>, <strong>40 files / 4,045 insertions</strong> (full <code>agent/</code> package, <code>sessions.py</code>, <code>guardrails.py</code>, tests, Playwright e2e, <code>uv.lock</code>).</li>
<li><strong>Support-triage agent</strong> — <code>c85e982</code>, branch <code>feature/support-triage-2026-06-20</code>: <strong>47 files / 3,353 insertions</strong> incl. a Next.js <code>ui/</code>; keyless gate verified (eval_lint exit 0, 14 passed + 1 key-gated skip).</li>
<li><strong>EARS → <code>[@eval]</code> binding works end to end</strong> — <code>test_file_retention</code> exists at line 12; enforced by an AST lint that runs twice so it can't slip through either entry point.</li>
<li>Each constitution MUST maps to a concrete owner → the constitution is <strong>enforced, not preached.</strong></li>
</ul>
<p><em>Source: <code>git show d6def4a --stat</code>; <code>git diff --stat befd889 c85e982</code>.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="49" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="what-failed--candid">What FAILED — candid</h2>
<ul>
<li><strong>Prose re-typed every build.</strong> <code>gates.md</code> = 31.8KB, <code>build.md</code> = 25.7KB, <code>constitution.md</code> = 12.8KB. Recipe code (<code>config.py</code>, <code>runner.py</code>, <code>eval_lint.py</code>, <code>demo_gate.sh</code>) is duplicated across files — exactly what <code>build.md</code> itself warns &quot;is how contracts silently drift.&quot;</li>
<li><strong>Dangling cross-references.</strong> <code>build.md</code>/<code>gates.md</code>/<code>constitution.md</code>/<code>drift-auditor.md</code> repeatedly cite <code>reports/archaeology/SPEC-RECONCILIATION.md</code>, <code>COMPETITIVE-RESEARCH.md</code>, <code>HARDENING-LOG</code>. <code>git ls-tree -r befd889</code> → <strong>NONE tracked</strong> (only <code>reports/sessions/.gitkeep</code>). Every &quot;(§ F)&quot;, &quot;(iter 7)&quot; points at a file that doesn't exist.</li>
<li><strong>Owner couldn't explain his own repo.</strong> The v3 &quot;tested core&quot; was really ~3k lines of <strong>prose recipes an AI re-typed into code each build</strong> — no <code>agent/</code> package, zero runnable tests in-repo.</li>
<li><strong>A long tail of false-green traps</strong> patched reactively: <code>asyncio_mode='auto'</code> skipping async tests; substring <code>[@eval]</code> false-greening TODOs; non-empty UI assert passing a &quot;no data loaded&quot; answer.</li>
</ul>
<p><em>Source: <code>wc -c</code> per file; <code>git ls-tree -r --name-only befd889</code>.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="50" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="this-sessions-reset-lean-agent-agnostic-v4">This session's RESET: lean, agent-agnostic v4</h2>
<p>We <strong>rejected</strong> the v3 delivery model (prose-recipes-as-core) and locked a new direction: a lean, human-manageable, coding-agent-<strong>agnostic</strong> harness.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>harness/   # agent-agnostic details &amp; logic (the brains, portable)
spec/      # generated from the user's prompt
code/      # generated from the user's prompt
.claude/   # ONLY thin INDEXES pointing into harness/
</code></pre>
<ul>
<li><strong>Primary constraint: <code>spec/</code> and <code>code/</code> must ALWAYS reconcile</strong> — both co-generated from one prompt, kept symmetric.</li>
<li>v3's reconciliation was <strong>one-way</strong> (<code>drift-auditor</code>, intent-authoritative, RECORD vs FLAG). We keep the discipline but make the constraint <strong>symmetric</strong>.</li>
<li>Tight iterative + human-in-loop; Claude-Code-native now, portable later.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="51" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">

<th>First (wrong)</th>
<th>Corrected to</th>
</tr>
</thead>

<tr>
<td>Deleted <code>harness/</code>, inlined details into <code>.claude/</code></td>
<td><code>harness/</code> holds agent-agnostic details; <code>.claude/</code> is a thin index</td>
</tr>
<tr>
<td>Framed it one-way: &quot;code is truth, spec is a projection&quot;</td>
<td>Constraint is <strong>symmetric reconciliation</strong> — neither side silently wins</td>
</tr>
<tr>
<td>Built a throwaway example app to demo it</td>
<td>No throwaway app; the harness is the deliverable</td>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="52" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="ideas-we-salvaged--whats-next">Ideas we SALVAGED + what's next</h2>
<p><strong>Keep (proven value):</strong></p>
<ol>
<li><strong>Proof-it-ran gate</strong> — done = app booted over HTTP and gave the <strong>right</strong> answer; 200-with-wrong-answer fails.</li>
<li><strong><code>[@eval]</code> test-binding</strong> — every EARS criterion bound to a real AST-resolved test; unbound → build fails.</li>
<li><strong>Judge-stability</strong> — multi-sampled LLM judge with margin so exit-0 is deterministic.</li>
<li><strong>Thin-slice v1</strong> — one real capability + honest deterministic stubs.</li>
<li>EARS acceptance criteria · 6. non-coder <code>/traces</code> dashboard.</li>
</ol>
<p><strong>Open bricks (after this deck):</strong> repo skeleton/contract · spec format · reconciliation mechanism · the harness workflow · the <code>.claude</code> index layer · validation by <strong>simulating</strong> workflows + review.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="53" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h1 id="closing--where-we-stand-in-the-field">Closing — Where We Stand in the Field</h1>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="54" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="the-comparison-matrix--every-cell-grounded">The comparison matrix — every cell grounded</h2>
<table>
<thead>
<tr>
<th>Dimension</th>
<th><strong>Us (v4 target)</strong></th>
<th>OpenSpec</th>
<th>Spec Kit</th>
<th>Kiro</th>
<th>Tessl</th>
<th>Academic-ideal</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Folder layout</strong></td>
<td>3 siblings: <code>harness/</code> + <code>spec/</code> + <code>code/</code>; <code>.claude/</code> = thin index</td>
<td>two-zone <code>openspec/specs/</code> vs <code>openspec/changes/</code> (~48 folders)</td>
<td><code>.specify/</code> + <code>specs/&lt;feat&gt;/</code></td>
<td><code>.kiro/specs/</code> + <code>.kiro/steering/</code></td>
<td>spec files + frontmatter, versioned in git</td>
<td>clean separation of intent vs artifact</td>
</tr>
<tr>
<td><strong>Spec format</strong></td>
<td>EARS lines + <code>[@eval]</code> + <code>targets:</code> glob, 1 file/capability</td>
<td>Markdown deltas (ADDED/MODIFIED/REMOVED)</td>
<td><code>spec.md</code>/<code>plan.md</code>/<code>tasks.md</code></td>
<td><code>requirements</code>/<code>design</code>/<code>tasks</code>.md</td>
<td>Markdown + YAML frontmatter, inline <code>[@test]</code></td>
<td>EARS (Mavin, IEEE RE'09) — 1 line <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> 1 test</td>
</tr>
<tr>
<td><strong>Reconciliation</strong></td>
<td>symmetric; <strong>intent wins</strong>, working-but-wrong code FLAGged</td>
<td>delta proposal → apply → archive</td>
<td><code>/analyze</code> read-only audit</td>
<td>approval gates per phase</td>
<td>drift-fix biased <strong>spec→code</strong></td>
<td>spec+code update in same commit (sync-owner-gate)</td>
</tr>
<tr>
<td><strong>Verification / proof</strong></td>
<td><strong>boot + 2-turn HTTP + judge-stable outcome eval; 200-with-wrong-answer FAILS</strong></td>
<td>LLM <code>/verify</code> (reads artifacts)</td>
<td>severity-tiered static audit</td>
<td>checkbox tasks</td>
<td>shell scripts resolve globs + run tests</td>
<td>specs execute as CI gates</td>
</tr>
<tr>
<td><strong>Agent-agnosticism</strong></td>
<td>logic in <code>harness/</code>; <code>.claude/</code> regenerable adapter</td>
<td>CLI, agent-neutral</td>
<td>multi-agent, neutral</td>
<td>Kiro IDE + AGENTS.md</td>
<td>appends to AGENTS.md</td>
<td>format-neutral</td>
</tr>
<tr>
<td><strong>Leanness</strong></td>
<td>~289 lines core; &quot;hold in your head&quot; bar</td>
<td>ceremony-heavy (changes/+archive/)</td>
<td>3 artifacts/feature</td>
<td>steering + 3 artifacts</td>
<td>low-ceremony</td>
<td>minimal-but-complete</td>
</tr>
</tbody>
</table>
<p><em>Source: OpenSpec dossier (Fission-AI, 55.7k★, MIT); Spec Kit <code>/speckit.analyze</code> 6-pass audit; Kiro <code>.kiro/steering/</code>; Tessl spec-verification tile; EARS = Mavin/Rolls-Royce IEEE RE'09.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="55" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="where-we-align-with-rigor">Where we ALIGN with rigor</h2>
<ul>
<li><strong>EARS acceptance criteria</strong> — the academic consensus for testable, drift-detectable requirements. We keep it verbatim; one EARS line maps ~1:1 to one test.<br />
<em>Source: Mavin et al., IEEE RE'09; Kiro also documents WHEN/SHALL.</em></li>
<li><strong>Spec<img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/>code<img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/>test binding is machine-checkable</strong> — <code>[@eval: path::case]</code> resolves via <strong>AST collection, not substring</strong>. Same spirit as Tessl's inline <code>[@test]</code> and committed <code>validate-specs.sh</code>. Unbound criterion ⇒ build fails.</li>
<li><strong>Reconciliation as the central job</strong> — matches the academic sync-owner-gate (spec + code must move together) and OpenSpec's &quot;what we have vs what we want&quot; framing.</li>
<li><strong>Constitution-style non-negotiables, each with a mechanical owner</strong> — Spec Kit (<code>constitution.md</code>), Kiro (<code>steering/</code>), and our baseline all converge here. Every MUST → a gate line / hook / lint.</li>
<li><strong>Execution-grounded validation</strong> — the field is moving toward &quot;specs execute as CI validation gates&quot; (<em>arXiv: Spec-Driven Development: From Code to Contract</em>); our proof gate is exactly that.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="56" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="where-we-deviate--and-why">Where we DEVIATE — and why</h2>
<table>
<thead>
<tr>
<th>We deviate</th>
<th>The field's norm</th>
<th>Why we deviate</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Proof = run it and judge the answer</strong></td>
<td>OpenSpec <code>/verify</code>, Spec Kit <code>/analyze</code>, Kiro read code/artifacts</td>
<td>Reading code can't catch a confident wrong answer. A <strong>200 with a wrong answer FAILS</strong> — the property <em>no competitor ships</em>. Proven across DataChat, data-analysis (<code>d6def4a</code>, 40 files, gate exits 0), support-triage.</td>
</tr>
<tr>
<td><strong>Intent wins on conflict</strong></td>
<td>Tessl biases drift-fix <strong>spec→code</strong></td>
<td>Letting reality silently overwrite intent certifies wrong behavior green — the exact failure we exist to prevent. Working-but-wrong code is FLAGged for a human, never auto-blessed.</td>
</tr>
<tr>
<td><strong>No separate <code>changes/</code> zone</strong></td>
<td>OpenSpec's two-zone tree (its single best idea)</td>
<td>Full <code>changes/</code>+<code>archive/</code>+<code>initiatives/</code> is the ceremony creep that made v3 unexplainable. <strong>Git branch = proposed, main = truth</strong> — for free. (We may keep one throwaway <code>changes/&lt;slug&gt;.md</code> delta.)</td>
</tr>
<tr>
<td><strong>1 Markdown file per capability</strong></td>
<td>Kiro/Spec Kit 3-artifact split</td>
<td>3 artifacts/capability is the artifact sprawl both dossiers flag as rot. Keep it to one screen.</td>
</tr>
<tr>
<td><strong>Claude-Code-only now</strong></td>
<td>AGENTS.md (60k repos, 20+ agents)</td>
<td>Deliberately rejected re-adding AGENTS.md (PR #23); it can't express Claude Code's command/subagent/skill/hook primitives the loop relies on. Logic stays in <code>harness/</code> so an adapter is a <em>generation target later</em>, not a rewrite.</td>
</tr>
</tbody>
</table>
<p>The hard constraint behind every deviation: <strong>human-manageability</strong>. The owner could not explain v3 (7.8k lines); v4 is &quot;lean, hold-in-your-head.&quot;</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="57" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="the-open-bricks-ahead">The open bricks ahead</h2>
<p>Six bricks remain after this deck (none built yet — current HEAD <code>fda90ac</code> is the 289-line lean core; <code>harness/</code> and top-level <code>spec/</code> are still the v4 <em>target</em>):</p>
<ol>
<li><strong>Repo skeleton &amp; contract</strong> — <code>harness/</code> (rules + recipes + gate scripts) · <code>spec/</code> (1 .md/capability) · <code>code/</code> · thin <code>.claude/</code>. <em>Open:</em> keep a <code>changes/&lt;slug&gt;.md</code> delta, or is the git branch the only change record?</li>
<li><strong>Spec format</strong> — EARS + <code>[@eval]</code> + <code>targets:</code> glob, kept lean. <em>Open:</em> one binding syntax, not two.</li>
<li><strong>Reconciliation mechanism</strong> — layered: <strong>mechanical commit gate</strong> (fail-closed) → <strong>drift-auditor</strong> (semantic) → <strong>intent-wins</strong> authority. <em>Open:</em> commit-time vs <code>/change</code>-time enforcement; the WIP escape hatch; the &quot;reality-wins, I confirm&quot; path.</li>
<li><strong>The harness workflow</strong> — correct the committed <strong>one-way</strong> loop (&quot;code is truth&quot;) to <strong>symmetric co-generation</strong>; wire reconciliation in as step ~3.5. Keep only 2 subagents (<code>spec-projector</code>, <code>reviewer</code>).</li>
<li><strong>The <code>.claude</code> index layer</strong> — thin stubs that load <code>harness/</code> docs on demand, with a <code>generate --check</code> anti-drift owner.</li>
<li><strong>Validation by simulation + review</strong> — see next-but-one slide.</li>
</ol>
<p><em>Note: NORTH-STAR.md still reads &quot;Code is truth; this document is its projection&quot; — brick 4 must flip this to symmetric.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="58" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="what-good-looks-like--the-synthesis">What good looks like — the synthesis</h2>
<p>A v4 that is <strong>lean, honest, and reconciled</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>repo/
├── harness/        # agent-agnostic: harness.md (rules+workflow index),
│                   #   recipes/, gate scripts. The ONE place to read.
├── spec/           # one EARS+[@eval]+targets: .md per capability
├── code/           # the generated app — the executable truth
└── .claude/        # THIN index: commands/agents/skills load harness/ on demand
</code></pre>
<ul>
<li><strong>Spec format</strong>: EARS body (the salvaged crown jewel) + one <code>targets:</code> glob so the gate knows which code a spec governs.</li>
<li><strong>Reconciliation</strong>: deterministic commit gate is the floor (the gap <em>every</em> competitor lacks); LLM drift-auditor only on top; <strong>intent wins</strong>, never auto-bless.</li>
<li><strong>Proof</strong>: keep the baseline DEMO gate verbatim — boot + two-turn HTTP + judge-stable eval. It's the proven performance bar.</li>
<li><strong>Leanness as a feature</strong>: a 4-step loop with 2 subagents stays explainable. Resist OpenSpec's schema engine and BMAD's 5-agent fan-out until a <em>second</em> workflow profile actually exists.</li>
</ul>
<blockquote>
<p>The discriminating test: can one person read the whole harness in 30 minutes and explain its core mechanism? v3 failed this. v4 must pass it.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="default" lang="en-IN" data-marpit-pagination="59" style="--paginate:true;--theme:default;" data-marpit-pagination-total="60" data-size="16:9">
<h2 id="how-well-validate-v4">How we'll validate v4</h2>
<p>Three layers, each doing only what it's good at:</p>
<table>
<thead>
<tr>
<th>Layer</th>
<th>Mechanism</th>
<th>Role</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Per-app floor</strong></td>
<td>Proof-it-ran gate (boot + 2-turn HTTP + multi-sample judge-stable eval)</td>
<td>Non-negotiable. Wrong answer on a 200 = FAIL. Kept <em>verbatim</em> from baseline.</td>
</tr>
<tr>
<td><strong>Cheap pre-flight</strong></td>
<td>Read-only coverage audit: every EARS line bound, every <code>targets:</code> glob covered, no orphans; severity tiers</td>
<td>Deterministic, fast, runs before the expensive boot. <em>Doubles as brick 3's mechanical gate.</em></td>
</tr>
<tr>
<td><strong>Harness self-test</strong></td>
<td><strong>Simulate the workflows</strong>: drive <code>/new</code> and <code>/change</code> against 2–3 sample ideas in CI; assert each ends in a <strong>reconciled spec+code that passes the proof gate</strong>. Plus an adversarial <code>reviewer</code> subagent that fixes nothing.</td>
<td>Validates the <em>harness itself</em>, not just an app.</td>
</tr>
</tbody>
</table>
<ul>
<li><strong>Keep the baseline that provably worked</strong> — encode its hard-won false-green fixes (asyncio_mode, AST-not-substring resolution, empty-data) as <strong>harness regression assertions</strong> so they can't silently return.</li>
<li><strong>Bound the cost</strong> — sample ideas run keyless with <code>FakeModel</code> for mechanics; one keyed run for the real outcome eval.</li>
</ul>
<p><em>Source: baseline proof gate (data-analysis <code>d6def4a</code>, support-triage keyless gate); Anthropic eval-driven development; Spec Kit <code>/analyze</code>; Tessl <code>evals/</code> (9 scenarios).</em></p>
</section>
