<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}appname{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f9f9f9; color: #111; padding: 2rem; }
    main { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    form { display: flex; flex-direction: column; gap: 0.75rem; }
    textarea, input[type="text"] { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; resize: vertical; }
    button[type="submit"] { align-self: flex-start; padding: 0.5rem 1.25rem; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button[type="submit"]:hover { background: #1d4ed8; }
    .result { white-space: pre-wrap; font-family: monospace; font-size: 0.9rem; }
    .error { color: #dc2626; }
    {% if stub_mode %}.stub-banner { background: #fef3c7; border: 1px solid #f59e0b; border-radius: 6px; padding: 0.5rem 1rem; margin-bottom: 1rem; font-size: 0.875rem; }{% endif %}
  </style>
</head>
<body>
  <main>
    {% if stub_mode %}
    <div class="stub-banner">⚠ Stub mode — no real API calls. Set APPNAME_LLM_PROVIDER to enable live responses.</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
